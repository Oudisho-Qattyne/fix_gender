<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل العائلات الكنسي — مراجعة البيانات</title>
    <meta name="description" content="نظام مراجعة وتصحيح بيانات العائلات في السجل الكنسي، تحديد الجنس وتصحيح بيانات الوالدين">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        /* ===== CSS VARIABLES ===== */
        :root {
            --bg-primary:     #080c18;
            --bg-secondary:   #0d1225;
            --accent-1:       #6c63ff;
            --accent-2:       #a855f7;
            --accent-3:       #22d3ee;
            --male-color:     #3b82f6;
            --male-bg:        rgba(59,130,246,0.14);
            --female-color:   #ec4899;
            --female-bg:      rgba(236,72,153,0.14);
            --glass-bg:       rgba(255,255,255,0.035);
            --glass-bg2:      rgba(255,255,255,0.055);
            --glass-border:   rgba(255,255,255,0.07);
            --glass-border2:  rgba(255,255,255,0.12);
            --text-primary:   #eef2ff;
            --text-secondary: rgba(238,242,255,0.58);
            --text-muted:     rgba(238,242,255,0.32);
            --success:        #10b981;
            --warning:        #f59e0b;
            --danger:         #ef4444;
            --radius-lg:      20px;
            --radius-md:      14px;
            --radius-sm:      9px;
            --ease:           cubic-bezier(0.4,0,0.2,1);
        }

        /* ===== RESET ===== */
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background orbs */
        body::before {
            content:'';
            position:fixed; top:-40%; right:-15%; width:65%; height:90%;
            background: radial-gradient(ellipse, rgba(108,99,255,0.11) 0%, transparent 68%);
            pointer-events:none; z-index:0;
        }
        body::after {
            content:'';
            position:fixed; bottom:-25%; left:-10%; width:55%; height:75%;
            background: radial-gradient(ellipse, rgba(168,85,247,0.07) 0%, transparent 68%);
            pointer-events:none; z-index:0;
        }

        /* ===== LOADING OVERLAY ===== */
        #loading-overlay {
            position:fixed; inset:0; background:var(--bg-primary);
            z-index:3000; display:none;
            flex-direction:column; align-items:center; justify-content:center; gap:1.2rem;
        }
        .spinner {
            width:52px; height:52px;
            border:3px solid var(--glass-border2);
            border-top-color:var(--accent-1);
            border-radius:50%;
            animation: spin .75s linear infinite;
        }
        @keyframes spin { to { transform:rotate(360deg); } }
        .loading-text { color:var(--text-secondary); font-size:1rem; font-weight:500; }

        /* ===== TOAST ===== */
        .toast {
            position:fixed; bottom:5.5rem; left:50%;
            transform:translateX(-50%) translateY(18px);
            background:#1a2235; border:1px solid var(--glass-border2);
            border-radius:var(--radius-md); padding:.7rem 1.5rem;
            font-size:.9rem; font-weight:600; color:var(--text-primary);
            z-index:800; opacity:0; transition:all .3s var(--ease);
            white-space:nowrap; pointer-events:none;
        }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
        .toast.success { border-color:rgba(16,185,129,.4); color:#10b981; }
        .toast.warning { border-color:rgba(245,158,11,.4); color:#f59e0b; }

        /* ===== UPLOAD SCREEN ===== */
        #upload-screen {
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            min-height:100vh; padding:2rem;
            position:relative; z-index:1;
        }

        .logo-section { text-align:center; margin-bottom:3rem; }
        .logo-icon {
            font-size:4.5rem; display:block;
            animation: float 3.5s ease-in-out infinite;
            margin-bottom:.75rem;
        }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
        .logo-title {
            font-size:2.6rem; font-weight:900;
            background:linear-gradient(135deg, var(--accent-1), var(--accent-2), var(--accent-3));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            background-clip:text; margin-bottom:.5rem;
        }
        .logo-subtitle { color:var(--text-secondary); font-size:1.05rem; }

        .upload-zone {
            width:100%; max-width:560px;
            background:var(--glass-bg);
            border:2px dashed var(--glass-border2);
            border-radius:var(--radius-lg); padding:3.5rem 2.5rem;
            text-align:center; cursor:pointer;
            transition:all .3s var(--ease);
            backdrop-filter:blur(12px);
            position:relative;
        }
        .upload-zone:hover, .upload-zone.drag-over {
            border-color:var(--accent-1);
            background:rgba(108,99,255,0.07);
            transform:scale(1.015);
            box-shadow:0 0 40px rgba(108,99,255,0.15);
        }
        .upload-zone input[type="file"] {
            position:absolute; inset:0; opacity:0;
            cursor:pointer; width:100%; height:100%;
        }
        .upload-icon { font-size:3.5rem; margin-bottom:1.2rem; }
        .upload-text-primary { font-size:1.3rem; font-weight:700; margin-bottom:.5rem; }
        .upload-text-secondary { font-size:.95rem; color:var(--text-secondary); }
        .upload-formats {
            margin-top:1.2rem; display:flex; gap:.5rem; justify-content:center;
        }
        .format-badge {
            padding:.25rem .85rem; border-radius:20px; font-size:.82rem; font-weight:700;
            background:rgba(108,99,255,0.18); color:var(--accent-1);
            border:1px solid rgba(108,99,255,0.28);
        }

        /* Restore session banner */
        .restore-banner {
            width:100%; max-width:560px; margin-top:1.5rem;
            background:rgba(16,185,129,0.08); border:1px solid rgba(16,185,129,0.25);
            border-radius:var(--radius-md); padding:1rem 1.5rem;
            display:flex; align-items:center; justify-content:space-between; gap:1rem;
        }
        .restore-info { font-size:.9rem; color:var(--success); font-weight:600; }
        .restore-info span { color:var(--text-secondary); font-weight:400; }
        .restore-btn {
            padding:.5rem 1.25rem; border-radius:var(--radius-sm);
            background:rgba(16,185,129,0.2); border:1px solid rgba(16,185,129,0.35);
            color:var(--success); font-family:'Cairo',sans-serif;
            font-weight:700; font-size:.9rem; cursor:pointer;
            transition:all .25s var(--ease); white-space:nowrap;
        }
        .restore-btn:hover {
            background:rgba(16,185,129,0.3);
            box-shadow:0 4px 15px rgba(16,185,129,0.25);
        }

        /* ===== APP SCREEN ===== */
        #app-screen { display:none; flex-direction:column; min-height:100vh; position:relative; z-index:1; }
        #app-screen.visible { display:flex; }

        /* ===== TOP BAR ===== */
        .top-bar {
            background:rgba(8,12,24,0.92); backdrop-filter:blur(20px);
            border-bottom:1px solid var(--glass-border);
            padding:.85rem 2rem; position:sticky; top:0; z-index:200;
        }
        .top-bar-inner {
            max-width:1300px; margin:0 auto;
            display:flex; align-items:center; gap:1.5rem;
        }
        .app-logo { font-size:1.5rem; flex-shrink:0; }
        .app-title {
            font-size:1.15rem; font-weight:800; white-space:nowrap;
            background:linear-gradient(135deg,var(--accent-1),var(--accent-2));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            background-clip:text;
        }
        .progress-section { flex:1; display:flex; flex-direction:column; gap:.35rem; }
        .progress-info {
            display:flex; justify-content:space-between;
            font-size:.82rem; color:var(--text-secondary);
        }
        .progress-bar-track {
            height:6px; background:rgba(255,255,255,0.06);
            border-radius:10px; overflow:hidden;
        }
        .progress-bar-fill {
            height:100%;
            background:linear-gradient(90deg,var(--accent-1),var(--accent-2));
            border-radius:10px; width:0%;
            transition:width .6s var(--ease);
        }
        .top-actions { display:flex; gap:.75rem; flex-shrink:0; }
        .btn-icon {
            padding:.55rem 1.15rem; border-radius:var(--radius-sm);
            font-family:'Cairo',sans-serif; font-weight:700; font-size:.88rem;
            cursor:pointer; transition:all .25s var(--ease); border:none;
            display:flex; align-items:center; gap:.4rem;
        }
        .btn-export {
            background:linear-gradient(135deg,var(--accent-1),var(--accent-2));
            color:#fff;
        }
        .btn-export:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(108,99,255,.4); }
        .btn-export-xl {
            background:rgba(34,197,94,0.15);
            color:#22c55e;
            border:1px solid rgba(34,197,94,0.3);
        }
        .btn-export-xl:hover { background:rgba(34,197,94,0.25); transform:translateY(-2px); box-shadow:0 6px 18px rgba(34,197,94,0.2); }
        .btn-clear {
            background:var(--glass-bg2); color:var(--text-secondary);
            border:1px solid var(--glass-border2);
        }
        .btn-clear:hover { background:rgba(239,68,68,0.1); color:var(--danger); border-color:rgba(239,68,68,0.3); }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex:1; padding:1.75rem 1.5rem; padding-bottom:1rem;
            max-width:1300px; margin:0 auto; width:100%;
        }

        /* ===== FAMILY CARD ===== */
        .family-card {
            background:var(--glass-bg);
            border:1px solid var(--glass-border2);
            border-radius:var(--radius-lg);
            backdrop-filter:blur(18px);
            overflow:hidden;
            box-shadow:0 24px 64px rgba(0,0,0,.45);
            animation:fadeUp .35s var(--ease);
        }
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(22px); }
            to   { opacity:1; transform:translateY(0); }
        }

        /* Family header */
        .family-header {
            background:linear-gradient(135deg,
                rgba(108,99,255,0.18) 0%,
                rgba(168,85,247,0.12) 50%,
                rgba(34,211,238,0.07) 100%);
            border-bottom:1px solid var(--glass-border);
            padding:1.5rem 2rem;
        }
        .family-header-top {
            display:flex; align-items:flex-start;
            justify-content:space-between;
            flex-wrap:wrap; gap:.75rem; margin-bottom:1.25rem;
        }
        .family-number-block {}
        .family-number {
            font-size:2.2rem; font-weight:900; color:var(--accent-1);
            line-height:1;
        }
        .family-file { font-size:.85rem; color:var(--text-secondary); margin-top:.2rem; }
        .header-right { display:flex; flex-direction:column; align-items:flex-end; gap:.5rem; }
        .badge-row { display:flex; gap:.5rem; flex-wrap:wrap; justify-content:flex-end; }
        .badge {
            padding:.3rem .9rem; border-radius:20px; font-size:.82rem; font-weight:600;
            background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.09);
            display:flex; align-items:center; gap:.35rem;
        }
        .badge-lbl { color:var(--text-muted); font-size:.72rem; }
        .badge-val { color:var(--text-primary); }
        .reviewed-pill {
            display:inline-flex; align-items:center; gap:.3rem;
            padding:.22rem .7rem; border-radius:20px; font-size:.75rem; font-weight:700;
            background:rgba(16,185,129,.14); color:var(--success);
            border:1px solid rgba(16,185,129,.28);
        }
        .swapped-pill {
            display:inline-flex; align-items:center; gap:.3rem;
            padding:.22rem .7rem; border-radius:20px; font-size:.75rem; font-weight:700;
            background:rgba(245,158,11,.14); color:var(--warning);
            border:1px solid rgba(245,158,11,.28);
        }

        /* Household grid */
        .household-grid {
            display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
            gap:.65rem;
        }
        .hh-item {}
        .hh-label { font-size:.68rem; color:var(--text-muted); font-weight:500; letter-spacing:.4px; text-transform:uppercase; }
        .hh-value { font-size:.9rem; color:var(--text-primary); font-weight:600; margin-top:.1rem; word-break:break-word; }

        /* ===== PARENTS SECTION ===== */
        .parents-section { padding:1.75rem 2rem; border-bottom:1px solid var(--glass-border); }

        .section-title {
            font-size:1rem; font-weight:700; color:var(--text-secondary);
            margin-bottom:1.25rem; display:flex; align-items:center; gap:.6rem;
        }
        .section-title::after { content:''; flex:1; height:1px; background:var(--glass-border); }

        .parents-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.25rem; }
        @media(max-width:780px) { .parents-grid { grid-template-columns:1fr; } }

        /* Member panel */
        .member-panel {
            background:rgba(255,255,255,0.025);
            border:1.5px solid var(--glass-border);
            border-radius:var(--radius-md); overflow:hidden;
            transition:all .3s var(--ease);
        }
        .member-panel.gender-male {
            border-color:rgba(59,130,246,.45);
            background:rgba(59,130,246,.04);
            box-shadow:0 0 20px rgba(59,130,246,.08);
        }
        .member-panel.gender-female {
            border-color:rgba(236,72,153,.45);
            background:rgba(236,72,153,.04);
            box-shadow:0 0 20px rgba(236,72,153,.08);
        }

        .member-panel-header {
            padding:1rem 1.25rem;
            display:flex; align-items:center; justify-content:space-between;
            border-bottom:1px solid var(--glass-border);
            flex-wrap:wrap; gap:.6rem;
        }
        .member-role { font-size:1rem; font-weight:800; color:var(--text-primary); }
        .member-name-sub { font-size:.82rem; color:var(--text-secondary); margin-top:.12rem; }

        /* Gender toggle */
        .gender-toggle { display:flex; gap:.4rem; }
        .gender-btn {
            padding:.32rem .9rem; border-radius:20px;
            border:1.5px solid; font-family:'Cairo',sans-serif;
            font-size:.84rem; font-weight:700; cursor:pointer;
            transition:all .25s var(--ease);
            display:flex; align-items:center; gap:.25rem;
            background:transparent;
        }
        .gender-btn.male {
            border-color:rgba(59,130,246,.35);
            color:rgba(59,130,246,.65);
        }
        .gender-btn.male:hover, .gender-btn.male.active {
            background:var(--male-bg); border-color:var(--male-color);
            color:var(--male-color); box-shadow:0 0 14px rgba(59,130,246,.25);
        }
        .gender-btn.female {
            border-color:rgba(236,72,153,.35);
            color:rgba(236,72,153,.65);
        }
        .gender-btn.female:hover, .gender-btn.female.active {
            background:var(--female-bg); border-color:var(--female-color);
            color:var(--female-color); box-shadow:0 0 14px rgba(236,72,153,.25);
        }

        /* Fields grid in panel */
        .member-fields {
            padding:1rem 1.25rem;
            display:grid; grid-template-columns:1fr 1fr; gap:.6rem;
        }
        .field-item { display:flex; flex-direction:column; gap:.18rem; }
        .field-item.fw { grid-column:1/-1; }
        .field-label { font-size:.68rem; color:var(--text-muted); font-weight:500; }
        .field-value {
            font-size:.88rem; color:var(--text-primary); font-weight:600;
            padding:.3rem .55rem; background:rgba(255,255,255,0.035);
            border-radius:var(--radius-sm); border:1px solid transparent;
            min-height:1.9rem; word-break:break-word; line-height:1.4;
        }
        .field-value.empty {
            color:var(--text-muted); font-style:italic; font-weight:400;
            background:transparent; border-color:transparent; font-size:.8rem;
        }

        /* ===== CHILDREN SECTION ===== */
        .children-section { padding:1.75rem 2rem; }
        .children-grid {
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
            gap:1rem;
        }

        .child-panel {
            background:rgba(255,255,255,0.025);
            border:1.5px solid var(--glass-border);
            border-radius:var(--radius-md); overflow:hidden;
            transition:all .3s var(--ease);
        }
        .child-panel.gender-male {
            border-color:rgba(59,130,246,.38); background:rgba(59,130,246,.035);
        }
        .child-panel.gender-female {
            border-color:rgba(236,72,153,.38); background:rgba(236,72,153,.035);
        }
        .child-panel-header {
            padding:.8rem 1rem; border-bottom:1px solid var(--glass-border);
            display:flex; align-items:center; justify-content:space-between; gap:.5rem;
        }
        .child-title {
            font-size:.9rem; font-weight:800;
            color:var(--accent-3);
        }
        .child-name-sub { font-size:.78rem; color:var(--text-secondary); margin-top:.1rem; }
        .child-fields {
            padding:.8rem 1rem;
            display:grid; grid-template-columns:1fr 1fr; gap:.5rem;
        }

        /* ===== NAVIGATION BAR ===== */
        .nav-bar {
            background:rgba(8,12,24,0.92); backdrop-filter:blur(20px);
            border-top:1px solid var(--glass-border);
            padding:.85rem 2rem; position:sticky; bottom:0; z-index:200;
        }
        .nav-inner {
            max-width:1300px; margin:0 auto;
            display:flex; align-items:center; justify-content:space-between; gap:1rem;
        }
        .nav-btn {
            padding:.7rem 1.8rem; border-radius:var(--radius-md);
            font-family:'Cairo',sans-serif; font-weight:700; font-size:.95rem;
            border:none; cursor:pointer;
            transition:all .25s var(--ease);
            display:flex; align-items:center; gap:.45rem;
        }
        .nav-btn.prev {
            background:var(--glass-bg2); color:var(--text-secondary);
            border:1px solid var(--glass-border2);
        }
        .nav-btn.prev:hover:not(:disabled) {
            background:rgba(255,255,255,.07); color:var(--text-primary);
        }
        .nav-btn.next {
            background:linear-gradient(135deg,var(--accent-1),var(--accent-2));
            color:#fff;
        }
        .nav-btn.next:hover:not(:disabled) {
            transform:translateY(-2px);
            box-shadow:0 8px 24px rgba(108,99,255,.4);
        }
        .nav-btn:disabled { opacity:.35; cursor:not-allowed; }
        .nav-counter { font-size:1.05rem; font-weight:700; color:var(--text-secondary); text-align:center; }
        .nav-counter strong { color:var(--accent-1); }

        /* Jump input */
        .jump-row {
            display:flex; align-items:center; gap:.4rem; justify-content:center;
        }
        .jump-input {
            width:60px; padding:.3rem .5rem; border-radius:8px;
            background:rgba(255,255,255,0.07); border:1px solid var(--glass-border2);
            color:var(--text-primary); font-family:'Cairo',sans-serif;
            font-size:.85rem; text-align:center; outline:none;
        }
        .jump-input:focus { border-color:var(--accent-1); }
        .jump-btn {
            padding:.3rem .75rem; border-radius:8px;
            background:rgba(108,99,255,0.2); border:1px solid rgba(108,99,255,0.3);
            color:var(--accent-1); font-family:'Cairo',sans-serif;
            font-weight:700; font-size:.82rem; cursor:pointer;
            transition:all .2s var(--ease);
        }
        .jump-btn:hover { background:rgba(108,99,255,0.35); }

        /* ===== SWAP MODAL ===== */
        .modal-overlay {
            position:fixed; inset:0;
            background:rgba(0,0,0,.75); backdrop-filter:blur(10px);
            z-index:1000; display:flex; align-items:center;
            justify-content:center; padding:1rem;
            opacity:0; visibility:hidden;
            transition:all .3s var(--ease);
        }
        .modal-overlay.visible { opacity:1; visibility:visible; }
        .modal-card {
            background:#11182b;
            border:1px solid rgba(245,158,11,.3);
            border-radius:var(--radius-lg); padding:2.5rem 2rem;
            max-width:460px; width:100%; text-align:center;
            transform:scale(.9) translateY(18px);
            transition:all .3s var(--ease);
            box-shadow:0 28px 64px rgba(0,0,0,.55),
                       0 0 40px rgba(245,158,11,.08);
        }
        .modal-overlay.visible .modal-card { transform:scale(1) translateY(0); }
        .modal-icon { font-size:3rem; margin-bottom:1rem; }
        .modal-title { font-size:1.4rem; font-weight:800; margin-bottom:.7rem; }
        .modal-message {
            font-size:.95rem; color:var(--text-secondary);
            line-height:1.85; margin-bottom:2rem;
        }
        .modal-btns { display:flex; gap:.85rem; justify-content:center; }
        .modal-btn {
            padding:.7rem 1.75rem; border-radius:var(--radius-md);
            font-family:'Cairo',sans-serif; font-weight:700; font-size:1rem;
            border:none; cursor:pointer; transition:all .25s var(--ease);
        }
        .modal-btn.confirm {
            background:linear-gradient(135deg,#f59e0b,#ef4444); color:#fff;
        }
        .modal-btn.confirm:hover {
            transform:translateY(-2px);
            box-shadow:0 8px 22px rgba(239,68,68,.4);
        }
        .modal-btn.cancel {
            background:var(--glass-bg2); color:var(--text-secondary);
            border:1px solid var(--glass-border2);
        }
        .modal-btn.cancel:hover { background:rgba(255,255,255,.07); color:var(--text-primary); }

        /* ===== EMPTY / NO DATA ===== */
        .empty-state {
            padding:3rem; text-align:center; color:var(--text-muted);
        }
        .empty-state .emoji { font-size:2.5rem; margin-bottom:.75rem; }
        .empty-state p { font-size:.95rem; }

        /* ===== RESPONSIVE ===== */
        @media(max-width:900px) {
            .top-bar { padding:.7rem 1rem; }
            .top-bar-inner { flex-wrap:wrap; gap:.5rem; }

<body>

<!-- ══════════════════════════ LOADING ══════════════════════════ -->

    <div class="spinner"></div>

<script>
/* ================================================================
   COLUMN DEFINITIONS  —  exact names from the Excel / CSV file
   ================================================================ */

const HOUSEHOLD_COLS = [
    'الرقم', 'رقم الملف', 'تاريخ الملف', 'الرعية التابع لها :',
    'الهاتف الارضي', 'لدي :', 'دفتر العائلة البيان عائلي', 'نوع السكن', 'العنوان :'
];

// Head of household personal columns (eligible for swap)
const HEAD_PERSONAL = [
    'الاسم الثلاثي :', 'اسم الأم', 'المواليد :', 'الرقم الوطني',
    'رقم الموبايل :', 'البريد الإلكتروني :', 'التحصيل العلمي :',
    'العمل (ان وجد) :', 'تاريخ المعمودية :', 'اسم الشفيع :', 'حالات خاصة :'
];
// Head-only fields NOT swapped
const HEAD_ONLY = ['الحالة الإجتماعية', 'ملاحظات أخرى'];
const HEAD_COLS = [...HEAD_PERSONAL, ...HEAD_ONLY];

// Spouse personal columns (same order as HEAD_PERSONAL for swap pairs)
const SPOUSE_PERSONAL = [
    'الاسم الثلاثي للزوج / للزوجة', 'اسم الأم والكنية :2', 'المواليد :3',
    'الرقم الوطني :4', 'رقم الموبايل :5', 'البريد الإلكتروني :6',
    'التحصيل العلمي :7', 'العمل (ان وجد) :8', 'تاريخ المعمودية :9',
    'اسم الشفيع :10', 'حالات خاصة :11'
];
// Spouse-only fields NOT swapped
const SPOUSE_ONLY = ['تاريخ الزواج :', 'نسبة المرض 0'];
const SPOUSE_COLS = [...SPOUSE_PERSONAL, ...SPOUSE_ONLY];

// Swap pairs: [head_col, spouse_col] — must match index-for-index
const SWAP_PAIRS = HEAD_PERSONAL.map((h, i) => [h, SPOUSE_PERSONAL[i]]);

// Children definitions (7 children, each with 12 fields)
const CHILDREN_DEFS = [
    { title:'الطفل الأول', cols:[
        'الاسم الثلاثي للطفل :', 'اسم الأم والكنية :12', 'المواليد :13', 'الرقم الوطني :14',
        'رقم الموبايل :15', 'البريد الإلكتروني :16', 'التحصيل العلمي :17', 'العمل (ان وجد) :18',
        'تاريخ المعمودية :19', 'اسم الشفيع :20', 'حالات خاصة 1', 'نسبة المرض 1'
    ]},
    { title:'الطفل الثاني', cols:[
        'الاسم الثلاثي للطفل الثاني :', 'اسم الأم والكنية :22', 'المواليد :23', 'الرقم الوطني :24',
        'رقم الموبايل :25', 'البريد الإلكتروني :26', 'التحصيل العلمي :27', 'العمل (ان وجد) :28',
        'تاريخ المعمودية :29', 'اسم الشفيع :30', 'حالات خاصة 2', 'نسبة المرض 2'
    ]},
    { title:'الطفل الثالث', cols:[
        'الاسم الثلاثي للطفل الثالث :', 'اسم الأم والكنية :32', 'المواليد :33', 'الرقم الوطني :34',
        'رقم الموبايل :35', 'البريد الإلكتروني :36', 'التحصيل العلمي :37', 'العمل (ان وجد) :38',
        'تاريخ المعمودية :39', 'اسم الشفيع :40', 'حالات خاصة 3', 'نسبة المرض 3'
    ]},
    { title:'الطفل الرابع', cols:[
        'الاسم الثلاثي للطفل الرابع :', 'اسم الأم والكنية :42', 'المواليد :43', 'الرقم الوطني :44',
        'رقم الموبايل :45', 'البريد الإلكتروني :46', 'التحصيل العلمي :47', 'العمل (ان وجد) :48',
        'تاريخ المعمودية :49', 'اسم الشفيع :50', 'حالات خاصة 4', 'نسبة المرض 4'
    ]},
    { title:'الطفل الخامس', cols:[
        'الاسم الثلاثي للطفل الخامس :', 'اسم الأم والكنية :52', 'المواليد :53', 'الرقم الوطني :54',
        'رقم الموبايل :55', 'البريد الإلكتروني :56', 'التحصيل العلمي :57', 'العمل (ان وجد) :58',
        'تاريخ المعمودية :59', 'اسم الشفيع :60', 'حالات خاصة 5', 'نسبة المرض 5'
    ]},
    { title:'الطفل السادس', cols:[
        'الاسم الثلاثي للطفل السادس :', 'اسم الأم والكنية :62', 'المواليد :63', 'الرقم الوطني :64',
        'رقم الموبايل :65', 'البريد الإلكتروني :66', 'التحصيل العلمي :67', 'العمل (ان وجد) :68',
        'تاريخ المعمودية :69', 'اسم الشفيع :70', 'حالات خاصة 6', 'نسبة المرض 6'
    ]},
    { title:'الطفل السابع', cols:[
        'الاسم الثلاثي للطفل السابع :', 'اسم الأم والكنية :72', 'المواليد :73', 'الرقم الوطني :74',
        'رقم الموبايل :75', 'البريد الإلكتروني :76', 'التحصيل العلمي :77', 'العمل (ان وجد) :78',
        'تاريخ المعمودية :79', 'اسم الشفيع :80', 'حالات خاصة 7', 'نسبة المرض 7'
    ]}
];

/* ================================================================
   CLEAN LABEL  —  strips suffix numbers/colons for display
   ================================================================ */
function cleanLabel(col) {
    return col
        .replace(/ :\d+$/, '')   // " :123" → ""
        .replace(/ :$/, '');     // trailing " :" → ""
}

/* ================================================================
   STATE
   ================================================================ */
let allRows      = [];   // parsed row objects (may be mutated by swap)
let currentIndex = 0;
let genderState  = {};   // { idx: { head, spouse, children:[], swapped, reviewed } }
let pendingSwap  = null; // { idx, gender }
const LS_KEY     = 'church_registry_v2';

/* ================================================================
   LOCAL STORAGE
   ================================================================ */
function saveLS() {
    try {
        localStorage.setItem(LS_KEY, JSON.stringify({ rows: allRows, genderState }));
    } catch(e) { /* quota exceeded, ignore */ }
}

function loadLS() {
    try {
        const raw = localStorage.getItem(LS_KEY);
        if (!raw) return null;
        return JSON.parse(raw);
    } catch(e) { return null; }
}

function clearLS() {
    localStorage.removeItem(LS_KEY);
}

/* ================================================================
   INIT GENDER STATE
   ================================================================ */
function initState(i) {
    if (!genderState[i]) {
        genderState[i] = {
            head: null, spouse: null,
            children: new Array(7).fill(null),
            swapped: false, reviewed: false
        };
    }
}

/* ================================================================
   FILE PARSING
   ================================================================ */
function parseFile(file) {
    return new Promise((resolve, reject) => {
        const reader  = new FileReader();
        const ext     = file.name.split('.').pop().toLowerCase();

        reader.onload = (e) => {
            try {
                let wb;
                if (ext === 'csv') {
                    const text = e.target.result;
                    // Auto-detect delimiter
                    const firstLine = text.split(/\r?\n/)[0];
                    const sep = firstLine.includes(';') ? ';' : ',';
                    wb = XLSX.read(text, { type:'string', FS:sep });
                } else {
                    wb = XLSX.read(e.target.result, { type:'array' });
                }
                const ws   = wb.Sheets[wb.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(ws, { defval:'' });
                // Filter out completely empty rows
                const filtered = rows.filter(r => Object.values(r).some(v => v !== ''));
                resolve(filtered);
            } catch(err) { reject(err); }
        };
        reader.onerror = reject;
        if (ext === 'csv') reader.readAsText(file, 'UTF-8');
        else               reader.readAsArrayBuffer(file);
    });
}

/* ================================================================
   UPLOAD HANDLING
   ================================================================ */
const uploadZone = document.getElementById('upload-zone');
const fileInput  = document.getElementById('file-input');

uploadZone.addEventListener('dragover', e => {
    e.preventDefault(); uploadZone.classList.add('drag-over');
});
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
    e.preventDefault(); uploadZone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => {
    if (e.target.files[0]) handleFile(e.target.files[0]);
});

async function handleFile(file) {
    showLoading(true);
    try {
        const rows = await parseFile(file);
        if (!rows || rows.length === 0) {
            showToast('الملف فارغ أو لا يحتوي على بيانات', 'warning');
            showLoading(false); return;
        }
        allRows      = rows;
        currentIndex = 0;
        genderState  = {};
        allRows.forEach((_, i) => initState(i));
        startApp();
        showLoading(false);
        showToast(`✅ تم تحميل ${rows.length} عائلة بنجاح`, 'success');
    } catch(err) {
        console.error(err);
        showToast('حدث خطأ أثناء قراءة الملف — تأكد من الصيغة', 'warning');
        showLoading(false);
    }
}

function startApp() {
    document.getElementById('upload-screen').style.display = 'none';
    document.getElementById('app-screen').classList.add('visible');
    updateProgress();
    renderFamily(currentIndex);
}

/* ================================================================
   HELPER — get cell value safely
   ================================================================ */
function v(row, col) {
    const val = row[col];
    return (val !== undefined && val !== null && val !== '') ? String(val).trim() : '';
}

function hasData(row, cols) {
    return cols.some(c => v(row, c) !== '');
}

function esc(str) {
    return str
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
}

/* ================================================================
   FIELD HTML BUILDER
   ================================================================ */
function fieldHtml(label, value, fullWidth) {
    const isEmpty = value === '';
    return `
        <div class="field-item${fullWidth ? ' fw' : ''}">
            <div class="field-label">${label}</div>
            <div class="field-value${isEmpty ? ' empty' : ''}">${isEmpty ? '—' : esc(value)}</div>
        </div>`;
}

/* ================================================================
   GENDER BUTTON HTML
   ================================================================ */
function genderBtns(idx, role, current, childIdx) {
    const ci = childIdx !== undefined ? `, ${childIdx}` : '';
    const mA = current === 'male'   ? ' active' : '';
    const fA = current === 'female' ? ' active' : '';
    return `
        <div class="gender-toggle">
            <button class="gender-btn male${mA}"   onclick="setGender(${idx},'${role}','male'${ci})">♂ ذكر</button>
            <button class="gender-btn female${fA}" onclick="setGender(${idx},'${role}','female'${ci})">♀ أنثى</button>
        </div>`;
}

/* ================================================================
   RENDER FAMILY CARD
   ================================================================ */
function renderFamily(idx) {
    const row   = allRows[idx];
    const state = genderState[idx];
    state.reviewed = true;
    saveLS();

    const fileNum = v(row,'رقم الملف') || v(row,'الرقم') || String(idx + 1);
    let html = `<div class="family-card">`;

    /* ── HEADER ── */
    html += `<div class="family-header">`;
    html += `<div class="family-header-top">`;
    html += `<div class="family-number-block">
                <div class="family-number"># ${esc(fileNum)}</div>
                <div class="family-file">ملف رقم: ${esc(v(row,'الرقم'))}</div>
             </div>`;
    html += `<div class="header-right">`;
    html += `<div class="badge-row">`;
    if (v(row,'الرعية التابع لها :'))
        html += `<div class="badge"><span class="badge-lbl">الرعية</span><span class="badge-val">${esc(v(row,'الرعية التابع لها :'))}</span></div>`;
    if (v(row,'تاريخ الملف'))
        html += `<div class="badge"><span class="badge-lbl">التاريخ</span><span class="badge-val">${esc(v(row,'تاريخ الملف'))}</span></div>`;
    html += `<div class="reviewed-pill">✓ تمت المراجعة</div>`;
    if (state.swapped)
        html += `<div class="swapped-pill">🔄 بيانات الوالدين مبدّلة</div>`;
    html += `</div></div>`;   // badge-row, header-right
    html += `</div>`;         // family-header-top

    // Household info row
    const hhFields = [
        ['الهاتف الارضي', v(row,'الهاتف الارضي')],
        ['نوع السكن',      v(row,'نوع السكن')],
        ['العنوان',        v(row,'العنوان :')],
        ['لدي',            v(row,'لدي :')],
        ['دفتر العائلة',  v(row,'دفتر العائلة البيان عائلي')],
    ].filter(([,val]) => val !== '');

    if (hhFields.length) {
        html += `<div class="household-grid">`;
        hhFields.forEach(([lbl,val]) => {
            html += `<div class="hh-item"><div class="hh-label">${lbl}</div><div class="hh-value">${esc(val)}</div></div>`;
        });
        html += `</div>`;
    }
    html += `</div>`;  // family-header

    /* ── PARENTS ── */
    html += `<div class="parents-section">`;
    html += `<div class="section-title">👨‍👩‍👧 الوالدان</div>`;
    html += `<div class="parents-grid">`;

    // Head panel
    const hG = state.head;
    html += `<div class="member-panel${hG ? ' gender-' + hG : ''}">`;
    html += `<div class="member-panel-header">
                <div>
                    <div class="member-role">رب الأسرة</div>
                    <div class="member-name-sub">${esc(v(row,'الاسم الثلاثي :')) || 'غير محدد'}</div>
                </div>
                ${genderBtns(idx, 'head', hG)}
             </div>`;
    html += `<div class="member-fields">`;
    HEAD_COLS.forEach(col => {
        html += fieldHtml(cleanLabel(col), v(row,col), HEAD_ONLY.includes(col));
    });
    html += `</div></div>`;  // member-panel

    // Spouse panel
    const sG = state.spouse;
    const hasSpouse = hasData(row, SPOUSE_COLS);
    html += `<div class="member-panel${sG ? ' gender-' + sG : ''}">`;
    html += `<div class="member-panel-header">
                <div>
                    <div class="member-role">الزوج / الزوجة</div>
                    <div class="member-name-sub">${esc(v(row,'الاسم الثلاثي للزوج / للزوجة')) || 'غير محدد'}</div>
                </div>
                ${hasSpouse ? genderBtns(idx, 'spouse', sG) : '<span style="font-size:.8rem;color:var(--text-muted)">لا يوجد</span>'}
             </div>`;
    html += `<div class="member-fields">`;
    SPOUSE_COLS.forEach(col => {
        html += fieldHtml(cleanLabel(col), v(row,col));
    });
    html += `</div></div>`;  // member-panel

    html += `</div></div>`;  // parents-grid, parents-section

    /* ── CHILDREN ── */
    const visChildren = CHILDREN_DEFS.filter(ch => hasData(row, ch.cols));
    if (visChildren.length) {
        html += `<div class="children-section">`;
        html += `<div class="section-title">👶 الأطفال (${visChildren.length})</div>`;
        html += `<div class="children-grid">`;

        CHILDREN_DEFS.forEach((child, ci) => {
            if (!hasData(row, child.cols)) return;
            const cG      = state.children[ci];
            const cName   = v(row, child.cols[0]);
            html += `<div class="child-panel${cG ? ' gender-' + cG : ''}">`;
            html += `<div class="child-panel-header">
                        <div>
                            <div class="child-title">${child.title}</div>
                            <div class="child-name-sub">${esc(cName) || 'غير محدد'}</div>
                        </div>
                        ${genderBtns(idx, 'child', cG, ci)}
                     </div>`;
            html += `<div class="child-fields">`;
            child.cols.forEach(col => {
                html += fieldHtml(cleanLabel(col), v(row, col));
            });
            html += `</div></div>`;  // child-panel
        });

        html += `</div></div>`;  // children-grid, children-section
    }

    html += `</div>`;  // family-card
    document.getElementById('main-content').innerHTML = html;
    updateProgress();
    updateNav();
}

/* ================================================================
   GENDER ASSIGNMENT
   ================================================================ */
function setGender(idx, role, gender, childIdx) {
    const state = genderState[idx];

    if (role === 'head') {
        // Toggle off
        if (state.head === gender) { state.head = null; saveLS(); renderFamily(idx); return; }
        state.head = gender;
        // Trigger swap prompt if head is female and no swap done yet
        // and there is spouse data to swap with
        if (gender === 'female' && !state.swapped) {
            pendingSwap = { idx, gender };
            showSwapModal();
            return;
        }
    } else if (role === 'spouse') {
        if (state.spouse === gender) { state.spouse = null; saveLS(); renderFamily(idx); return; }
        state.spouse = gender;
    } else if (role === 'child') {
        if (state.children[childIdx] === gender) {
            state.children[childIdx] = null; saveLS(); renderFamily(idx); return;
        }
        state.children[childIdx] = gender;
    }

    saveLS();
    renderFamily(idx);
}

/* ================================================================
   SWAP LOGIC
   ================================================================ */
function showSwapModal() {
    document.getElementById('modal-message').innerHTML = `
        تم تحديد <strong>رب الأسرة</strong> كـ <strong>أنثى ♀</strong>.<br>
        يبدو أن بيانات الزوج والزوجة مُدخَلة بشكل معكوس.<br>
        هل تريد تبديل البيانات الشخصية بين الحقلين؟
    `;
    document.getElementById('swap-modal').classList.add('visible');
}

function confirmSwap() {
    hideSwapModal();
    if (!pendingSwap) return;
    const { idx } = pendingSwap;
    const row     = allRows[idx];
    const state   = genderState[idx];

    // Swap personal field pairs
    SWAP_PAIRS.forEach(([hCol, sCol]) => {
        const hv = row[hCol] ?? '';
        const sv = row[sCol] ?? '';
        row[hCol] = sv;
        row[sCol] = hv;
    });

    // Swap gender assignments
    const tmp      = state.head;
    state.head     = state.spouse;
    state.spouse   = tmp;
    state.swapped  = !state.swapped;

    pendingSwap = null;
    saveLS();
    renderFamily(idx);
    showToast('✅ تم تبديل بيانات الوالدين بنجاح', 'success');
}

function cancelSwap() {
    hideSwapModal();
    if (pendingSwap) {
        // Gender assignment was already set, just don't swap data
        saveLS();
        renderFamily(pendingSwap.idx);
        pendingSwap = null;
    }
}

function hideSwapModal() {
    document.getElementById('swap-modal').classList.remove('visible');
}

/* ================================================================
   NAVIGATION
   ================================================================ */
function navigate(dir) {
    const next = currentIndex + dir;
    if (next < 0 || next >= allRows.length) return;
    currentIndex = next;
    renderFamily(currentIndex);
    window.scrollTo({ top:0, behavior:'smooth' });
}

function jumpTo() {
    const input = document.getElementById('jump-input');
    const num   = parseInt(input.value, 10);
    if (isNaN(num) || num < 1 || num > allRows.length) {
        showToast('رقم غير صحيح', 'warning'); return;
    }
    currentIndex = num - 1;
    input.value  = '';
    renderFamily(currentIndex);
    window.scrollTo({ top:0, behavior:'smooth' });
}

function updateNav() {
    document.getElementById('btn-prev').disabled = currentIndex === 0;
    document.getElementById('btn-next').disabled = currentIndex === allRows.length - 1;
    document.getElementById('nav-current').textContent = currentIndex + 1;
    document.getElementById('nav-total').textContent   = allRows.length;
}

function updateProgress() {
    const total    = allRows.length;
    const reviewed = Object.values(genderState).filter(s => s.reviewed).length;
    const pct      = total > 0 ? Math.round((reviewed / total) * 100) : 0;
    document.getElementById('progress-bar').style.width  = pct + '%';
    document.getElementById('progress-count').textContent = `${reviewed} / ${total}`;
    document.getElementById('progress-label').textContent  = `تمت مراجعة ${pct}%`;
}

/* ================================================================
   EXPORT HELPERS
   ================================================================ */
function buildExportRows() {
    const gLabel = g => g === 'male' ? 'ذكر' : g === 'female' ? 'أنثى' : '';
    return allRows.map((row, i) => {
        const s = genderState[i] || { head:null, spouse:null, children:[], swapped:false };
        return {
            ...row,
            'جنس رب الأسرة':     gLabel(s.head),
            'جنس الزوج/الزوجة':  gLabel(s.spouse),
            'تم تبديل الوالدين': s.swapped ? 'نعم' : 'لا',
            'جنس الطفل 1': gLabel(s.children[0]),
            'جنس الطفل 2': gLabel(s.children[1]),
            'جنس الطفل 3': gLabel(s.children[2]),
            'جنس الطفل 4': gLabel(s.children[3]),
            'جنس الطفل 5': gLabel(s.children[4]),
            'جنس الطفل 6': gLabel(s.children[5]),
            'جنس الطفل 7': gLabel(s.children[6]),
        };
    });
}

/* Export as CSV — same semicolon format as the source, with UTF-8 BOM so
   Excel opens Arabic text correctly. Result is tiny (plain text). */
function exportCSV() {
    if (!allRows.length) { showToast('لا توجد بيانات للتصدير', 'warning'); return; }
    const rows = buildExportRows();
    const ws   = XLSX.utils.json_to_sheet(rows);
    // csv_to_sheet writes CSV; we use sheet_to_csv then build blob manually
    // so we can force semicolons (FS) and add the BOM for Arabic in Excel
    const csv  = XLSX.utils.sheet_to_csv(ws, { FS: ';' });
    const bom  = '\uFEFF';                         // UTF-8 BOM
    const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const date = new Date().toISOString().split('T')[0];
    a.href     = url;
    a.download = `سجل_العائلات_المصحح_${date}.csv`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    showToast('⬇️ تم تصدير CSV بنجاح (حجم صغير)', 'success');
}

/* Export as XLSX with ZIP compression enabled — much smaller than the default. */
function exportXLSX() {
    if (!allRows.length) { showToast('لا توجد بيانات للتصدير', 'warning'); return; }
    const rows = buildExportRows();
    const ws   = XLSX.utils.json_to_sheet(rows);
    const wb   = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'العائلات المصححة');
    const date = new Date().toISOString().split('T')[0];
    // compression:true enables deflate inside the ZIP → 60-80% smaller
    XLSX.writeFile(wb, `سجل_العائلات_المصحح_${date}.xlsx`, { compression: true });
    showToast('⬇️ تم تصدير Excel بنجاح', 'success');
}

/* Default export button calls CSV (smallest) */
function exportData() { exportCSV(); }

/* ================================================================
   CLEAR SESSION
   ================================================================ */
function clearSession() {
    if (!confirm('هل أنت متأكد من مسح جميع بيانات الجلسة؟ لا يمكن التراجع.')) return;
    clearLS();
    allRows = []; genderState = {}; currentIndex = 0;
    document.getElementById('app-screen').classList.remove('visible');
    document.getElementById('upload-screen').style.display = 'flex';
    showToast('تم مسح الجلسة', 'warning');
}

/* ================================================================
   SESSION RESTORE
   ================================================================ */
function restoreSession() {
    const saved = loadLS();
    if (!saved || !saved.rows || !saved.rows.length) return;
    allRows     = saved.rows;
    genderState = saved.genderState || {};
    allRows.forEach((_, i) => initState(i));
    currentIndex = 0;
    startApp();
    showToast(`✅ تم استعادة ${allRows.length} عائلة`, 'success');
}

/* ================================================================
   UI UTILITIES
   ================================================================ */
function showLoading(show) {
    document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
}

let toastTimer;
function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className   = `toast ${type || ''} show`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
}

/* ================================================================
   KEYBOARD SHORTCUTS
   ================================================================ */
document.addEventListener('keydown', e => {
    const app = document.getElementById('app-screen');
    if (!app.classList.contains('visible')) return;
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowLeft')  navigate(1);
    if (e.key === 'ArrowRight') navigate(-1);
    if (e.key === 'Escape')     hideSwapModal();
});

document.getElementById('jump-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') jumpTo();
});

/* ================================================================
   ON LOAD — check for saved session
   ================================================================ */
window.addEventListener('load', () => {
    const saved = loadLS();
    if (saved && saved.rows && saved.rows.length > 0) {
        genderState = saved.genderState || {};
        const total    = saved.rows.length;
        const reviewed = Object.values(genderState).filter(s => s.reviewed).length;
        const banner = document.getElementById('restore-banner');
        document.getElementById('restore-info-text').textContent =
            `${total} عائلة — تمت مراجعة ${reviewed} منها`;
        banner.style.display = 'flex';
    }
});
</script>
